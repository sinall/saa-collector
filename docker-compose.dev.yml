version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_HOST=db
      - DATABASE_NAME=saa_collector
      - DATABASE_USER=root
      - DATABASE_PASSWORD=password
      - SECRET_KEY=dev-secret-key-for-development
      - DEBUG=True
      - SERVICE=runserver
      - DEV_MODE_TOKEN=dev-token-for-ai-collab
    volumes:
      - ./backend:/app
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=saa_collector
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"

volumes:
  mysql_data:
